<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live PnL Dashboard</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="widget">

  <div class="top">
    <h2>PnL Dashboard</h2>

    <div class="stats">
      <div class="card">
        <p>Total Profit</p>
        <div class="profit" id="profitValue">+$0</div>
      </div>

      <div class="card">
        <p>Total Loss</p>
        <div class="loss" id="lossValue">-$0</div>
      </div>
    </div>
  </div>

  <canvas id="plChart"></canvas>

  <div class="footer">
    Live Notion Connected Dashboard
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
